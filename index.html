<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="울티마 온라인 t2a 지향 프리 샤드.">
    <meta name="keywords" content="t2a 순정 복원 프로젝트">
    <title>울티마 온라인 Felucca 샤드</title>
    <head>
    <style>
        /* 페이지 전체 기본 설정 */
        body { margin: 0; padding: 0; font-family: sans-serif; }

        /* 헤더 영역 구분 */
        header { 
            background-color: #f8f9fa; 
            padding: 20px; 
            border-bottom: 2px solid #ddd; 
        }

        /* 본문 영역 구분 */
        main { 
            padding: 20px; 
            min-height: 400px; /* 콘텐츠가 적어도 최소 높이를 유지함 */
            background-color: #ffffff; 
        }

        /* 푸터 영역 구분 */
        footer { 
            background-color: #333; 
            color: white; 
            text-align: center; 
            padding: 10px; 
            margin-top: 20px; 
        }
    </style>
</head>
</head>
<body>
    <header>
        <h1>울티마 온라인 펠루카 샤드</h1>
        <nav>
            <ul>
                <li><a href="#">클라이언트 다운</a></li>
                <li>서버 상태: <span href="http://61.105.41.171:8000" id="server-status" target="_blank">확인 중...</span></li>
                <li><a href="#" target="_blank">게시판</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>[서버 안내]</h2>
            <div id="content-area">내용을 불러오는 중...</div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 비영리 내돈 내산 운영.</p>
    </footer>

   <script>
    const statusEl = document.getElementById('server-status');
    // 서버의 응답을 체크하는 방식 (상태를 더 확실하게 확인)
    fetch('http://61.105.41.171:8000', { mode: 'no-cors', cache: 'no-cache' })
        .then(() => {
            // mode: 'no-cors'에서는 성공/실패 여부를 정확히 알기 어렵지만,
            // 일단 요청이 시도되었다는 것만으로도 ON으로 표시하는 것이 일반적입니다.
            statusEl.innerText = "● ON";
            statusEl.style.color = "green";
        })
        .catch(() => {
            statusEl.innerText = "○ OFF";
            statusEl.style.color = "red";
        });
</script>

</body>
</html>
