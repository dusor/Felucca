<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>울티마 온라인 Felucca 샤드</title>
    <style>
        /* 1. 기본 스타일 (깃허브 느낌) */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            color: #24292f;
        }

        /* 2. 헤더 스타일 */
        header { 
            background-color: #ffffff; 
            padding: 16px 32px; 
            border-bottom: 1px solid #d0d7de;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        header h1 { font-size: 18px; margin: 0; }

        header nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 20px;
        }

        header nav a {
            text-decoration: none;
            color: #24292f;
            font-weight: 500;
            font-size: 14px;
        }

        /* 3. 메인 콘텐츠 스타일 */
        main { 
            max-width: 900px;
            margin: 24px auto;
            background-color: #ffffff; 
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 24px;
        }

        h2 { font-size: 20px; border-bottom: 1px solid #d0d7de; padding-bottom: 10px; }

        /* 4. 푸터 스타일 */
        footer { 
            text-align: center; 
            color: #57606a; 
            font-size: 12px;
            margin-top: 40px; 
        }
    </style>
</head>
<body>

    <header>
        <h1>울티마 온라인 펠루카 샤드</h1>
        <nav>
            <ul>
                <li><a href="#">📁 다운로드</a></li>
                <li><a href="#">📋 게시판</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>[서버 안내]</h2>
            <div id="content-area">내용을 불러오는 중...</div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 비영리 내돈 내산 운영.</p>
    </footer>

    <script>
        fetch('content.txt')
            .then(response => response.text())
            .then(data => {
                document.getElementById('content-area').innerText = data;
            })
            .catch(() => {
                document.getElementById('content-area').innerText = '내용을 불러오는데 실패했습니다.';
            });
    </script>
</body>
</html>
